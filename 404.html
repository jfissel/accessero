<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — accessero</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#070405" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%23ff2230' stroke-width='3.5'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .lost {
      min-height: 100svh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      gap: 1.2rem; padding: var(--gutter);
    }
    .lost__ring {
      width: 72px; aspect-ratio: 1; border-radius: 50%;
      border: 3px solid var(--red);
      box-shadow: 0 0 60px rgba(255, 34, 48, 0.35);
    }
    .lost__code {
      font-family: var(--font-mono); font-size: 0.8rem;
      letter-spacing: 0.3em; color: var(--grey);
    }
    .lost__title {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900; letter-spacing: -0.04em; line-height: 1;
    }
    .lost__title em { color: var(--red); }
    .lost__sub { font-weight: 300; color: var(--grey); max-width: 38ch; }
    .lost a.btn { margin-top: 1rem; }
  </style>
</head>
<body data-theme="dark">
  <main class="lost">
    <div class="lost__ring" aria-hidden="true"></div>
    <p class="lost__code">ERROR&nbsp;404</p>
    <h1 class="lost__title">This page is <em>off the grid.</em></h1>
    <p class="lost__sub">Whatever you were looking for isn’t drawing power here.</p>
    <a class="btn btn--solid" href="/"><span>Back to accessero</span></a>
  </main>
</body>
</html>
